{% extends "mailing/base.html" %}

{% block title %}Подробности о получателе{% endblock %}

{% block content %}
    <h2 class="text-center">Подробная информация о получатели рассылки</h2>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-center">
                    <p><strong>Email:</strong> {{ recipient.email }}</p>
                    <p><strong>Ф. И. О.:</strong> {{ recipient.full_name }}</p>
                    <p><strong>Комментарий:</strong> {{ recipient.comments }}</p>
                    <a href="{% url 'mailing:recipient_list' %}" class="btn btn-primary">Назад</a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
