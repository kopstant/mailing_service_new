{% extends "mailing/base.html" %}

{% block title %}Сброс пароля{% endblock %}

{% block content %}
    <div class="row justify-content-center text-center">
        <div class="col-md-6">
            <div class="card">
                <h2>Вы действительно хотите сбросить пароль?</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary mb-3">Изменить пароль</button>
                    <a href="{% url 'home' %}" class="btn btn-primary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
